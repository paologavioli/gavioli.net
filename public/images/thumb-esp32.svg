<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <rect width="72" height="72" rx="6" fill="#1b1b1d"/>
  <!-- chip body -->
  <rect x="18" y="20" width="36" height="32" rx="2" fill="none" stroke="#ee7b3d" stroke-width="1.5"/>
  <!-- left pins -->
  <line x1="10" y1="27" x2="18" y2="27" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="10" y1="33" x2="18" y2="33" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="10" y1="39" x2="18" y2="39" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="10" y1="45" x2="18" y2="45" stroke="#ee7b3d" stroke-width="1.5"/>
  <!-- right pins -->
  <line x1="54" y1="27" x2="62" y2="27" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="54" y1="33" x2="62" y2="33" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="54" y1="39" x2="62" y2="39" stroke="#ee7b3d" stroke-width="1.5"/>
  <line x1="54" y1="45" x2="62" y2="45" stroke="#ee7b3d" stroke-width="1.5"/>
  <!-- chip label -->
  <text x="36" y="34" font-family="monospace" font-size="9" fill="#ee7b3d" text-anchor="middle" font-weight="600">ESP</text>
  <text x="36" y="44" font-family="monospace" font-size="7" fill="#ee7b3d" text-anchor="middle" opacity="0.6">32</text>
</svg>
